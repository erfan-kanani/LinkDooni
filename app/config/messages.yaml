  welcome: |
    سلام {first_name} 👋

    من <b>لینک‌دونی</b>‌ام. لینک‌های وب رو برات نگه می‌دارم تا هر وقت لازم شد، داخل هر چت تلگرامی پیداشون کنی و بفرستی.

    🚀 <b>سه‌گام برای شروع:</b>
    ۱. هر لینکی رو همین‌جا برام بفرست تا ذخیره کنم.
    ۲. لینک‌ها رو دسته‌بندی کن یا علاقه‌مندی بزن.
    ۳. توی هر چت دیگه، فقط <code>@link_dooni_bot</code> رو تایپ کن — لینک‌هات می‌آن.
  help: |
    🧭 <b>راهنمای لینک‌دونی</b>

    📥 <b>ذخیره</b> — لینک رو همین‌جا بفرست.
    🔍 <b>جستجو</b> — توی هر چت، <code>@link_dooni_bot</code> رو تایپ کن.
    📁 <b>دسته‌بندی</b> — /categories
    ⭐ <b>علاقه‌مندی</b> — /favorites
    📤 <b>خروجی</b> — /export

    💡 <b>نکته:</b> توی پنل جستجوی تلگرام می‌تونی بنویسی <code>دسته:۲</code> تا فقط یه دسته خاص نشون داده بشه، یا <code>fav</code> برای علاقه‌مندی‌ها.
