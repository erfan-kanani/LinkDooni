  welcome: |
    Welcome to LinkDooni, {first_name}.

    Send me one or more website links and I will help you save, categorize, search, and export them.
  help: |
    LinkDooni keeps your business links organized inside Telegram.

    Send a URL directly to save it.
    Use /categories to browse and manage categories.
    Use /search to find links by title, URL, category, tag, or note.
    Use /favorites to view pinned links.
    Use /export to download your data.
