fa:
  app_name: "لینک‌دونی"
  commands:
    start: "شروع"
    help: "راهنما"
    categories: "دسته‌بندی‌ها"
    add: "افزودن لینک"
    search: "جستجو"
    favorites: "علاقه‌مندی‌ها"
    export: "خروجی"
    settings: "تنظیمات"
  welcome: |
    {first_name} عزیز، به لینک‌دونی خوش آمدی.

    لینک‌های سایت‌ها را برایم بفرست تا ذخیره، دسته‌بندی، جستجو و خروجی گرفتن از آن‌ها را داخل تلگرام انجام بدهی.
  help: |
    لینک‌دونی برای مرتب کردن لینک‌های کاری داخل تلگرام ساخته شده است.

    برای ذخیره، لینک را مستقیم بفرست.
    با /categories دسته‌بندی‌ها را مدیریت کن.
    با /search بر اساس عنوان، آدرس، دسته، برچسب یا یادداشت جستجو کن.
    با /favorites لینک‌های پین‌شده را ببین.
    با /export از داده‌ها خروجی بگیر.
  menu:
    categories: "دسته‌بندی‌ها"
