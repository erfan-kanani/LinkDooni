services:
  db:
    image: postgres:16-alpine
    container_name: linkdooni-postgres
    environment:
      POSTGRES_DB: linkdooni
      POSTGRES_USER: linkdooni
      POSTGRES_PASSWORD: linkdooni
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - linkdooni-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkdooni -d linkdooni"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bot:
    build: .
    container_name: linkdooni-bot
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://linkdooni:linkdooni@db:5432/linkdooni
      LINKDOONI_AUTO_CREATE_DB: "false"
    restart: unless-stopped

volumes:
  linkdooni-postgres-data:
